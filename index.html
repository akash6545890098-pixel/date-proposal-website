<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >

  <title>Date Proposal</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- PAGE 1 -->

<section
  class="page active"
  id="page1"
>

  <div class="card">

    <div class="emoji">
      💌
    </div>

    <h1>
      Will you go on a date with me?
    </h1>

    <div class="buttons">

      <button
        class="yes"
        onclick="showPage(2)"
      >
        Yes
      </button>

      <button
        class="no"
        id="noBtn"
      >
        No
      </button>

    </div>

  </div>

</section>

<!-- PAGE 2 -->

<section
  class="page"
  id="page2"
>

  <div class="card">

    <div class="emoji">
      🎉
    </div>

    <h1>
      no way, NO WAY 😳
    </h1>

    <p>
      I kinda would've preferred
      if you said no
    </p>

    <button
      class="continue"
      onclick="showPage(3)"
    >
      Continue
    </button>

  </div>

</section>

<!-- PAGE 3 -->

<section
  class="page"
  id="page3"
>

  <div class="card">

    <h1>
      Choose Date Type ✨
    </h1>

    <div class="foods">

      <!-- ROOM DATE -->

      <div class="food active-food">

        🛏️

        <span>
          ROOM DATE
        </span>

      </div>

      <!-- SCOOTY DATE -->

      <div class="food">

        🛵

        <span>
          RIDE DATE ON YOUR SCOOTY
        </span>

      </div>

      <!-- FOOD DATE -->

      <div class="food">

        🍽️

        <span>
          FOOD DATE
        </span>

      </div>

      <!-- PARK DATE -->

      <div class="food">

        🌳

        <span>
          PARK DATE
        </span>

      </div>

    </div>

    <button
      class="continue"
      onclick="showPage(4)"
    >
      Continue →
    </button>

  </div>

</section>

<!-- PAGE 4 -->

<section
  class="page"
  id="page4"
>

  <div class="card form-card">

    <h1>
      Enter WhatsApp Number 📱
    </h1>

    <form>

      <label>
        WhatsApp Number
      </label>

      <input
        type="tel"
        id="whatsappNumber"
        placeholder="Enter WhatsApp Number"
      >

      <label>
        Date
      </label>

      <input
        type="date"
        id="dateInput"
      >

      <label>
        Time
      </label>

      <input
        type="time"
        id="timeInput"
      >

      <label>
        Location
      </label>

      <textarea
        rows="4"
        id="locationInput"
        placeholder="Write location..."
      ></textarea>

      <button
        type="button"
        class="continue"
        onclick="sendWhatsApp()"
      >
        Send Request 💖
      </button>

    </form>

  </div>

</section>

<script src="script.js"></script>

<!-- REMOVE VERCEL TOOLBAR -->

<script>

window.addEventListener(
  "load",
  () => {

    const vercelToolbar =
    document.querySelector(
      '[data-vercel-toolbar]'
    );

    if(vercelToolbar){

      vercelToolbar.remove();

    }

  }
);

</script>

</body>
</html>
