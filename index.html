<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Date Proposal</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

<!-- PAGE 1 -->

<section class="page active" id="page1">

  <div class="card">

    <div class="emoji">💌</div>

    <h1>Will you go on a date with me?</h1>

    <div class="buttons">

      <button
        class="yes"
        onclick="showPage(2)"
      >
        Yes
      </button>

      <button
        class="no"
        id="noBtn"
      >
        No
      </button>

    </div>

  </div>

</section>

<!-- PAGE 2 -->

<section class="page" id="page2">

  <div class="card">

    <div class="emoji">🎉</div>

    <h1>no way, NO WAY 😳</h1>

    <p>
      I kinda would've preferred if you said no
    </p>

    <button
      class="continue"
      onclick="showPage(3)"
    >
      Continue
    </button>

  </div>

</section>

<!-- PAGE 3 -->

<section class="page" id="page3">

  <div class="card form-card">

    <h1>So... when are you free?</h1>

    <form>

      <label>Date</label>

      <input
        type="date"
        id="dateInput"
      />

      <label>Time</label>

      <input
        type="time"
        id="timeInput"
      />

      <label>Location</label>

      <textarea
        rows="4"
        placeholder="Write location..."
        id="locationInput"
      ></textarea>

      <button
        type="button"
        class="continue"
        onclick="showPage(4)"
      >
        Baby yay →
      </button>

    </form>

  </div>

</section>

<!-- PAGE 4 -->

<section class="page" id="page4">

  <div class="card food-card">

    <h1>Choose Date Type ✨</h1>

    <div class="foods">

      <div class="food active-food">

        🛏️

        <span>ROOM DATE</span>

      </div>

      <div class="food">

        🛵

        <span>RIDE DATE ON YOUR SCOOTY</span>

      </div>

      <div class="food">

        🌃

        <span>NIGHT ROOM DATE</span>

      </div>

      <div class="food">

        🌳

        <span>PARK DATE</span>

      </div>

    </div>

    <button
      class="continue"
      onclick="sendWhatsApp()"
    >
      Let's Goo 💖
    </button>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
